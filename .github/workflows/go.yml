name: Go

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  check-cyrillic-comments:
    runs-on: 'ubuntu-24.04'
    steps:
      - uses: actions/checkout@v7
      - name: check cyrillic comments
        run: |
          ! LC_ALL=en_US.UTF-8 grep --exclude-dir=.git --exclude-dir=.github --exclude-dir=.idea -I -r --color -n -E "[А-Яа-яЁё]+" .

  validate-go:
    needs:
      - check-cyrillic-comments
    runs-on: 'ubuntu-24.04'
    steps:
      - uses: actions/checkout@v7

      - name: setup go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: check go.mod
        run: |
          go mod tidy
          git diff --exit-code go.mod

      - name: go fmt
        run: |
          go fmt ./...
          git diff --exit-code

  golangci-lint:
    needs:
      - validate-go
    runs-on: 'ubuntu-24.04'
    steps:
      - uses: actions/checkout@v7
      - name: setup go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: false
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9.0
          skip-cache: true
          problem-matchers: true

  go-test-unit:
    needs:
      - golangci-lint
    runs-on: 'ubuntu-24.04'
    steps:
      - uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: unit test
        run: |
          go test -count 1 ./...
